services:
  - type: web
    name: voicehub-server
    env: node
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: "10000"
      - key: OPENAI_MODEL
        value: deepseek-chat
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        generateValue: true
      - key: OPENAI_API_KEY
        generateValue: true
