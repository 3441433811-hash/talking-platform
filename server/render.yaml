services:
  - type: web
    name: voicehub-server
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
